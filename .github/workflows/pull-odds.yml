name: Daily HR Odds Pull

# Once a day: pull HR odds, log today's picks, grade past days, commit snapshots.
# This is the ONLY place that spends Odds API credits.

on:
  schedule:
    - cron: '0 19 * * *'   # 19:00 UTC = ~3pm ET. Adjust if you want earlier/later.
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  pull-odds:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull odds
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python pull_odds.py

      - name: Log + grade results
        continue-on-error: true
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python log_results.py

      - name: Commit snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add odds_cache.json
          if [ -f results_log.json ]; then git add results_log.json; fi
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update odds + results [skip ci]"
            git push origin HEAD:main
          fi

name: Closing Line Pull (CLV)
on:
  schedule:
    - cron: '40 22 * * *'   # ~6:40 PM ET — before most first pitches
  workflow_dispatch:
jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Pull closing lines
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python pull_closing.py
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --no-rebase --no-edit || true
          git add results_log.json
          git commit -m "Closing lines (CLV)" || echo "no changes"
          git push || echo "push failed"
